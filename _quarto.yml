
knitr:
  opts_chunk: 
    comment: "|"
    fig.align: center
    fig.height: 4
    fig.width: 4
    collapse: true
    out.extra: ""
    tidy: TRUE

format:
  html:
    theme: [cosmo, _xtra/square.scss]
    include-after-body: abbr-toc.html 
    toc: true
    toc-depth: 4
    toc-expand: 1
    toc-float: true
    toc-location: right
    toc-title: --------
    number-sections: true
    highlight-style: github
    eval: true
    echo: false
    warning: false
    message: false
    cache: false
    digits: 4
    #code-fold: false
    #code-summary: "Show R code"
    #code-tools: true
    smooth-scroll: true
    df-print: paged
    grid:
      margin-width: 200px
      gutter-width: 1.5rem
    include-in-header:
      text: |
        <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
        <style>
          body { font-family: 'DM Sans', sans-serif; }
          h1, h2, h3 { font-family: 'Source Serif 4', serif; }
          code, pre { font-family: 'JetBrains Mono', monospace; font-size: 0.87em; }
          .callout { border-radius: 6px; }
          .equation-box {
            background: #f8f9fb;
            border-left: 4px solid #2c6fad;
            padding: 1rem 1.4rem;
            margin: 1rem 0;
            border-radius: 0 6px 6px 0;
          }
          table { font-size: 0.92em; }
        </style>

  typst:
    template-partials:
      - _xtra/typst-template.typ
      - _xtra/typst-show.typ

  pdf:
    include-in-header: 
      text: |
        \usepackage{booktabs}
        \usepackage{makecell}
        \usepackage{float}
        \renewcommand{\contentsname}{}
        \usepackage{titling}
        \definecolor{vub_blue}{HTML}{003399}
        \pretitle{
        \begin{center}
        \LARGE
        \begin{figure}[!h]
        \begin{minipage}{4cm}
        \includegraphics[width=4cm,height=1cm,left]{_xtra/_hdr_logo.png}\\[\bigskipamount]
        \end{minipage}
        \end{figure}
        }
        \posttitle{\end{center}}
        \usepackage[export]{adjustbox}
        \usepackage{graphicx}
        \usepackage{fancyhdr}
        \usepackage{xcolor}
        \pagestyle{fancy}
        \setlength\headheight{46.3pt}
        \fancyhead[L]{\includegraphics[height=.7cm]{_xtra/_hdr_logo.png}}
        \fancyfoot[L]{\textcolor{vub_blue}{}}
        \fancyfoot[R]{\textcolor{vub_blue}{square.research.vub.be}}


format-links: false